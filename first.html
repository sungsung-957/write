<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國小生字筆順教學網</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
    /* 自訂 SVG 容器樣式 */
    .svg-container { border: 6px solid #16a085; border-radius: 24px; background-color: #ffffff; box-shadow: 0 12px 30px rgba(22, 160, 133, 0.12); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-3 md:p-6">

  <div class="w-full max-w-6xl bg-white rounded-3xl shadow-xl p-4 md:p-6 flex flex-col md:flex-row gap-6">
    
    <!-- 左側控制區 (略過不變) -->
    <div class="w-full md:w-5/12 flex flex-col gap-4">
      <select id="lesson-select" class="w-full bg-white border-2 p-3 font-bold text-slate-800 rounded-xl">
        <option value="1">第一課</option><option value="2">第二課</option>
      </select>
      <div id="char-grid" class="grid grid-cols-5 gap-2"></div>
      <button id="btn-mark-learned" class="bg-emerald-600 text-white py-3 rounded-xl">我寫好了！</button>
    </div>

    <!-- 右側繪圖區 -->
    <div class="w-full md:w-7/12 flex flex-col gap-3">
      <div class="svg-container h-[400px] w-full flex items-center justify-center">
        <svg id="stroke-svg" viewBox="0 0 1024 1024" width="100%" height="100%"></svg>
      </div>
      <div id="timer-status" class="text-sm font-bold text-teal-600">準備就緒</div>
    </div>
  </div>

<script>
    // 1. 初始化資料庫
    const LessonDatabase = {
      "1": ["灣", "甜", "糖", "童", "寒", "椰", "隊", "蕉", "街", "島", "唾", "沫", "忠", "衛"],
      "2": ["區", "恐", "陀", "螺", "聚", "架", "速", "彷", "彿", "汽", "泉", "抹", "訝", "牙", "齒"]
    };

    // 2. 繪圖核心函式
    function drawStrokes(pathList) {
        const svg = document.getElementById('stroke-svg');
        svg.innerHTML = ''; 
        pathList.forEach(d => {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", "#16a085");
            path.setAttribute("stroke-width", "60");
            path.setAttribute("stroke-linecap", "round");
            path.setAttribute("stroke-linejoin", "round");
            svg.appendChild(path);
        });
    }

    // 3. 讀取數據繪圖 (現在不需要 iframe 了)
    async function loadMoeStrokeAnimation(char) {
        const status = document.getElementById('timer-status');
        status.textContent = "正在讀取標準筆順...";
        
        try {
            const response = await fetch('strokeData.json'); 
            const data = await response.json();
            
            if (data[char]) {
                drawStrokes(data[char]);
                status.textContent = `已顯示「${char}」字標準筆順`;
            } else {
                status.textContent = "該字筆順資料庫暫無資料";
            }
        } catch (e) {
            status.textContent = "請確保 strokeData.json 已上傳";
        }
    }

    // 4. 渲染按鈕
    function renderCharGrid() {
      const grid = document.getElementById('char-grid');
      grid.innerHTML = '';
      const list = LessonDatabase["1"]; 
      list.forEach((char) => {
        const btn = document.createElement('button');
        btn.textContent = char;
        btn.className = "bg-white border-2 border-slate-200 p-3 rounded-xl font-bold text-2xl hover:border-teal-500 hover:text-teal-600 transition-all";
        btn.onclick = () => loadMoeStrokeAnimation(char);
        grid.appendChild(btn);
      });
    }

    // 初始化執行
    window.onload = () => {
        renderCharGrid();
        loadMoeStrokeAnimation('蕉'); // 預設載入
    };
</script>
</body>
</html>
